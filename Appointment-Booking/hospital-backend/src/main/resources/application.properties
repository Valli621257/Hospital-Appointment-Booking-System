# Server Configuration
server.port=8083

# Database Configuration (H2 In-Memory for testing)
# spring.datasource.url=jdbc:h2:mem:hospitaldb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=root
# spring.datasource.password=root
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true

# MySQL Configuration (Uncomment to use if you have MySQL running)
spring.datasource.url=jdbc:mysql://localhost:3306/hos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JPA / Hibernate
spring.jpa.show-sql=true

# Security (JWT Secret)
jwt.secret=your_very_secure_secret_key_which_should_be_long_enough_for_hs512
jwt.expiration=86400000
spring.jackson.serialization.write-dates-as-timestamps=false

# Error Handling
server.error.include-message=always
